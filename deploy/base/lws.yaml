apiVersion: leaderworkerset.x-k8s.io/v1
kind: LeaderWorkerSet
metadata:
  name: ${JOB_NAME}
  labels:
    app: ${JOB_NAME}
spec:
  replicas: 1
  leaderWorkerTemplate:
    size: ${N_WORKERS}
    workerTemplate:
      metadata:
        labels:
          app: ${JOB_NAME}
      spec:
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
              - matchExpressions:
                - key: kubernetes.io/arch
                  operator: In
                  values: ["${ARCH}"]

        initContainers:
          - name: sysctl
            image: public.ecr.aws/docker/library/busybox:1.36
            command: ["sh", "-c"]
            args:
              - |
                sysctl -w net.ipv4.ip_local_port_range='1024 65535'
                sysctl -w net.ipv4.tcp_tw_reuse=1
            securityContext:
              privileged: true

        containers:
          - name: nyann-bench
            image: ghcr.io/neuralmagic/nyann-bench:${IMAGE_TAG}
            imagePullPolicy: Always
            resources:
              limits:
                cpu: "4"
                memory: "8Gi"
            ports:
              - name: metrics
                containerPort: 9090
                protocol: TCP
              - name: barrier
                containerPort: 8080
                protocol: TCP
            args:
              - --log-level
              - ${LOG_LEVEL}
              - generate
              - --target
              - ${TARGET}
              - --config
              - /etc/nyann-bench/config.json
              - --metrics
              - :9090
              - --sync
              - '{"workers":${N_WORKERS}}'
            volumeMounts:
              - name: config
                mountPath: /etc/nyann-bench
                readOnly: true
        volumes:
          - name: config
            configMap:
              name: ${JOB_NAME}-config
