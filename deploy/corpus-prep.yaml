apiVersion: batch/v1
kind: Job
metadata:
  name: corpus-prep
  labels:
    app: nyann-bench
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: nvidia.com/gpu.present
                    operator: Exists
      initContainers:
        - name: download
          image: curlimages/curl:8.5.0
          securityContext:
            runAsUser: 0
          command: ["sh", "-c"]
          args:
            - |
              mkdir -p ${CORPUS_DIR}
              echo "Downloading ${SOURCE_NAME}..."
              curl -L -o ${CORPUS_DIR}/${SOURCE_NAME}.json "${SOURCE_URL}"
              ls -lh ${CORPUS_DIR}/
          volumeMounts:
            - mountPath: /mnt/lustre
              name: lustre
      containers:
        - name: convert
          image: ghcr.io/neuralmagic/nyann-bench:latest
          args:
            - corpus
            - --input
            - ${CORPUS_DIR}/${SOURCE_NAME}.json
            - --output
            - ${CORPUS_DIR}/${SOURCE_NAME}.txt
          volumeMounts:
            - mountPath: /mnt/lustre
              name: lustre
      volumes:
        - name: lustre
          persistentVolumeClaim:
            claimName: lustre-pvc-vllm
